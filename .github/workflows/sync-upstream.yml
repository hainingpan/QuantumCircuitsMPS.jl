name: Sync with Upstream

# Mirrors hainingpan/QuantumCircuitsMPS.jl -> Pixley-Research-Group-in-CMT fork.
# Pushes over SSH with a repo-scoped deploy key (secret SYNC_KEY) because the
# built-in GITHUB_TOKEN is a GitHub App token and is forbidden from pushing
# changes to .github/workflows/* ("refusing to allow a GitHub App to create or
# update workflow ... without `workflows` permission").
#
# Setup (one-time, on the FORK):
#   1. Settings -> Deploy keys -> add the PUBLIC key, check "Allow write access"
#   2. Settings -> Secrets and variables -> Actions -> secret SYNC_KEY = PRIVATE key

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  sync_with_upstream:
    runs-on: ubuntu-latest
    name: Sync main with upstream

    # Only run this if we are inside the Pixley Fork
    if: github.repository == 'Pixley-Research-Group-in-CMT/QuantumCircuitsMPS.jl'

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SYNC_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Mirror upstream main
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          # Push over SSH so the deploy key (not the App token) authenticates
          git remote set-url origin git@github.com:Pixley-Research-Group-in-CMT/QuantumCircuitsMPS.jl.git
          git remote add upstream https://github.com/hainingpan/QuantumCircuitsMPS.jl.git
          git fetch upstream

          # Mirror semantics: fork main is always exactly upstream main.
          # Self-heals from any divergence (e.g. old keepalive commits).
          git reset --hard upstream/main
          git push origin main --force

      - name: Anti-Hibernation Ping
        run: |
          last_commit=$(git log -1 --format=%ct)
          now=$(date +%s)
          days_diff=$(( (now - last_commit) / 86400 ))
          if [ $days_diff -gt 50 ]; then
            git commit --allow-empty -m "Keepalive ping"
            git push origin main
          fi
