name: Benchmarks

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmarks:
    # Only run on the canonical repo, not mirror forks (e.g. Pixley org)
    if: github.repository == 'hainingpan/QuantumCircuitsMPS.jl'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: MilesCranmer/AirspeedVelocity.jl@action-v1
        with:
          julia-version: '1'
