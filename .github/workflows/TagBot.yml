name: TagBot

on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      lookback:
        default: "3"

permissions:
  actions: read
  checks: read
  contents: write
  deployments: read
  issues: read
  discussions: read
  packages: none
  pages: read
  pull-requests: read
  repository-projects: read
  security-events: none
  statuses: read

jobs:
  TagBot:
    # Only run on the canonical repo, not mirror forks (e.g. Pixley org)
    if: github.repository == 'hainingpan/QuantumCircuitsMPS.jl' && (github.event_name == 'workflow_dispatch' || github.actor == 'JuliaTagBot')
    runs-on: ubuntu-latest
    steps:
      - uses: JuliaRegistries/TagBot@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ssh: ${{ secrets.DOCUMENTER_KEY }}
